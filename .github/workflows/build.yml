name: Build Verification

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Sync submodules recursively
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install build and capture tools
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build libcap2-bin tcpdump wireshark-common
          sudo setcap cap_net_raw,cap_net_admin=eip "$(command -v dumpcap)"
          sudo setcap cap_net_raw,cap_net_admin=eip "$(command -v tcpdump)"

      - name: Build Linux executable and SDK
        run: ./scripts/linux_build.sh

      - name: Verify Linux outputs
        run: |
          test -x build/linux/APlayReceiver
          test -f build/linux/sdk-cpp/libAPlaySdk.so

      - name: Verify Linux mDNS harness
        run: ./harness/verify_mdns.sh

      - name: Summarize mDNS harness result
        if: ${{ always() }}
        run: |
          if [ -f resources/pcap/mdns_verify_result.txt ]; then
            cat resources/pcap/mdns_verify_result.txt
            {
              echo "### mDNS harness result"
              sed 's/^/- /' resources/pcap/mdns_verify_result.txt
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "mDNS harness result file was not produced"
            {
              echo "### mDNS harness result"
              echo "- status=unknown"
              echo "- message=result file was not produced"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload mDNS harness capture
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-mdns-harness-results
          path: |
            resources/pcap/mdns_announce.pcapng
            resources/pcap/mdns_replay.log
            resources/pcap/mdns_verify_result.txt
          if-no-files-found: warn

      - name: Upload Linux artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: |
            build/linux/APlayReceiver
            build/linux/sdk-cpp/libAPlaySdk.so
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-24.04

    env:
      ANDROID_HOME: /home/runner/Android/Sdk
      ANDROID_SDK_ROOT: /home/runner/Android/Sdk
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools

      - name: Install Android native toolchain
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            .gradle/caches
            .gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/android/**/*.gradle*', 'app/android/gradle/wrapper/gradle-wrapper.properties', 'sdk/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android app and SDK
        run: ./scripts/android_build.sh

      - name: Verify Android outputs
        run: |
          test -f app/android/build/outputs/apk/debug/APlayReceiver-debug.apk
          test -f sdk/build/outputs/aar/APlaySdk-debug.aar

      - name: Upload Android artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: android-build
          path: |
            app/android/build/outputs/apk/debug/APlayReceiver-debug.apk
            sdk/build/outputs/aar/APlaySdk-debug.aar
          if-no-files-found: error

  harmony:
    name: Harmony
    runs-on: ubuntu-24.04

    env:
      HARMONY_COMMAND_LINE_TOOLS: /home/runner/tools/command-line-tools
      HARMONY_SDK_HOME: /home/runner/tools/command-line-tools/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Sync submodules recursively
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Install Harmony runtime dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 openjdk-17-jdk-headless

      - name: Download Harmony command line tools
        if: ${{ !env.ACT }}
        run: |
          mkdir -p /home/runner/tools
          curl -fL -o /tmp/command-line-tools.tar.gz https://github.com/kgbook/HarmonyOSCommandLineTools/releases/download/6.1.1.280/command-line-tools.tar.gz
          tar -xzf /tmp/command-line-tools.tar.gz -C /home/runner/tools

      - name: Build Harmony app and SDK
        run: ./scripts/harmony_build.sh

      - name: Verify Harmony outputs
        run: |
          test -f sdk/build/default/outputs/default/APlaySdk.har
          test -f app/harmony/APlayReceiver/build/default/outputs/default/APlayReceiver-default-unsigned.hap

      - name: Upload Harmony artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: harmony-build
          path: |
            sdk/build/default/outputs/default/APlaySdk.har
            app/harmony/APlayReceiver/build/default/outputs/default/APlayReceiver-default-unsigned.hap
          if-no-files-found: error
