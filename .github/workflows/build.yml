name: Build Verification

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake ninja-build

      - name: Build Linux executable and SDK
        run: ./scripts/linux_build.sh

      - name: Verify Linux outputs
        run: |
          test -x build/linux/APlayReceiver
          test -f build/linux/sdk-cpp/libAPlaySdk.so

      - name: Upload Linux artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: linux-build
          path: |
            build/linux/APlayReceiver
            build/linux/sdk-cpp/libAPlaySdk.so
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-24.04

    env:
      ANDROID_HOME: /home/runner/Android/Sdk
      ANDROID_SDK_ROOT: /home/runner/Android/Sdk
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: tools platform-tools

      - name: Install Android native toolchain
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;25.1.8937393" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            .gradle/caches
            .gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('app/android/**/*.gradle*', 'app/android/gradle/wrapper/gradle-wrapper.properties', 'sdk/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Android app and SDK
        run: ./scripts/android_build.sh

      - name: Verify Android outputs
        run: |
          test -f app/android/build/outputs/apk/debug/APlayReceiver-debug.apk
          test -f sdk/build/outputs/aar/APlaySdk-debug.aar

      - name: Upload Android artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v7
        with:
          name: android-build
          path: |
            app/android/build/outputs/apk/debug/APlayReceiver-debug.apk
            sdk/build/outputs/aar/APlaySdk-debug.aar
          if-no-files-found: error
